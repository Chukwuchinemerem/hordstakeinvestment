services:
  - type: web
    name: hordstake
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn cryptovest.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hordstake-db
          property: connectionString

databases:
  - name: hordstake-db
    plan: free
