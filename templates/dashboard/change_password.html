{% extends 'dashboard/base_dashboard.html' %}
{% block page_title %}Change Password{% endblock %}
{% block dashboard_content %}
<div class="max-w-md glass-card p-6">
  <h3 class="text-white font-semibold text-lg mb-5">Change Password</h3>
  <form method="POST" class="space-y-4">
    {% csrf_token %}
    <div><label class="block text-slate-300 text-xs font-medium mb-1.5">Current Password</label><input type="password" name="old_password" class="form-input" required/></div>
    <div><label class="block text-slate-300 text-xs font-medium mb-1.5">New Password</label><input type="password" name="new_password1" class="form-input" required/></div>
    <div><label class="block text-slate-300 text-xs font-medium mb-1.5">Confirm New Password</label><input type="password" name="new_password2" class="form-input" required/></div>
    <button type="submit" class="btn-primary">Update Password</button>
  </form>
</div>
{% endblock %}
