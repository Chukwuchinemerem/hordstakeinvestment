{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen bg-navy-900 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="flex items-center gap-2 mb-8 justify-center">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fa fa-bolt text-white"></i></div>
      <span class="text-white font-display font-bold text-2xl">HORDSTAKE</span>
    </div>
    <div class="glass-card p-8">
      <h1 class="text-white font-display font-bold text-2xl mb-2">Reset Password</h1>
      <p class="text-slate-400 text-sm mb-6">Enter your email address and we'll send you reset instructions.</p>
      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div><label class="block text-slate-300 text-xs font-medium mb-1.5">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required/></div>
        <button type="submit" class="btn-primary w-full justify-center py-3.5">Send Reset Link</button>
        <a href="/auth/login/" class="block text-center text-blue-400 text-sm hover:text-blue-300 mt-4">← Back to Sign In</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
